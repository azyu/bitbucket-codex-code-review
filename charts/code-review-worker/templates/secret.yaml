{{/*
Database secret — only created when existingSecret is NOT set
*/}}
{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "code-review-worker.fullname" . }}-database
  labels:
    {{- include "code-review-worker.labels" . | nindent 4 }}
type: Opaque
data:
  db-password: {{ .Values.database.password | b64enc | quote }}
---
{{- end }}
{{/*
Redis secret
*/}}
{{- if not .Values.redis.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "code-review-worker.fullname" . }}-redis
  labels:
    {{- include "code-review-worker.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ .Values.redis.password | b64enc | quote }}
---
{{- end }}
{{/*
Bitbucket secret
*/}}
{{- if not .Values.bitbucket.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "code-review-worker.fullname" . }}-bitbucket
  labels:
    {{- include "code-review-worker.labels" . | nindent 4 }}
type: Opaque
data:
  bitbucket-api-token: {{ .Values.bitbucket.apiToken | b64enc | quote }}
  bitbucket-app-password: {{ .Values.bitbucket.appPassword | b64enc | quote }}
  bitbucket-webhook-secret: {{ .Values.bitbucket.webhookSecret | b64enc | quote }}
{{- end }}
