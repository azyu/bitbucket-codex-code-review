{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "code-review-worker.fullname" . }}
  labels:
    {{- include "code-review-worker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "code-review-worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.port }}
          protocol: TCP
        - port: {{ .Values.metricsPort }}
          protocol: TCP
    {{- with .Values.networkPolicy.ingressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS (Bitbucket API, Codex)
    - ports:
        - port: 443
          protocol: TCP
    # Allow MySQL
    - ports:
        - port: {{ .Values.database.port }}
          protocol: TCP
    # Allow Redis
    - ports:
        - port: {{ .Values.redis.port }}
          protocol: TCP
    {{- with .Values.networkPolicy.egressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
