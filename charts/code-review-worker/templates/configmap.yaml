apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code-review-worker.fullname" . }}
  labels:
    {{- include "code-review-worker.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.nodeEnv | quote }}
  PORT: {{ .Values.port | quote }}
  METRICS_PORT: {{ .Values.metricsPort | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  # Database (non-sensitive)
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_USERNAME: {{ .Values.database.username | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_SYNCHRONIZE: {{ .Values.database.synchronize | quote }}
  DB_LOGGING: {{ .Values.database.logging | quote }}
  DB_POOL_SIZE: {{ .Values.database.poolSize | quote }}
  DB_POOL_MAX_IDLE: {{ .Values.database.poolMaxIdle | quote }}
  # Redis (non-sensitive)
  REDIS_QUEUE_HOST: {{ .Values.redis.host | quote }}
  REDIS_QUEUE_PORT: {{ .Values.redis.port | quote }}
  REDIS_QUEUE_USERNAME: {{ .Values.redis.username | quote }}
  REDIS_QUEUE_DB: {{ .Values.redis.db | quote }}
  # Queue
  QUEUE_RETRY_ATTEMPTS: {{ .Values.queue.retryAttempts | quote }}
  QUEUE_RETRY_DELAY: {{ .Values.queue.retryDelay | quote }}
  # Codex
  CODEX_BINARY_PATH: {{ .Values.codex.binaryPath | quote }}
  CODEX_TIMEOUT_MS: {{ .Values.codex.timeoutMs | quote }}
  CODEX_MODEL: {{ .Values.codex.model | quote }}
  CODEX_REASONING_EFFORT: {{ .Values.codex.reasoningEffort | quote }}
  # Bitbucket (non-sensitive)
  BITBUCKET_BASE_URL: {{ .Values.bitbucket.baseUrl | quote }}
  BITBUCKET_USERNAME: {{ .Values.bitbucket.username | quote }}
  # Workspace
  WORKSPACE_BASE_PATH: {{ .Values.workspace.basePath | quote }}
  WORKSPACE_MAX_CONCURRENT: {{ .Values.workspace.maxConcurrent | quote }}
  # Trigger
  REVIEW_TRIGGER_MODE: {{ .Values.trigger.mode | quote }}
